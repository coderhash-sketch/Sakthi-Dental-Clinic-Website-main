<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sakthi Dental Clinic</title>
    <meta name="description" content="Get in touch with Sakthi Dental Clinic in Hosur. Book an appointment or ask a question.">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="fas fa-tooth me-2"></i>SAKTHI DENTAL
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Page Header -->
<header class="py-5 bg-light text-center">
    <div class="container">
        <h1 class="fw-bold">Contact Us</h1>
        <p class="text-muted">We're here to help you achieve a healthy smile.</p>
    </div>
</header>

<!-- Contact Section -->
<section class="py-5">
    <div class="container">
        <div class="row g-5">
            
            <!-- Contact Form -->
            <div class="col-lg-7">
                <div class="contact-form">
                    <h3 class="fw-bold mb-4">Send us a Message</h3>

                    <!-- FORM -->
                    <form action="https://formspree.io/f/xkovadgr" method="POST">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Full Name *</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Email Address *</label>
                                <input type="email" name="email" class="form-control" required>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label small fw-bold">Phone Number *</label>
                                <input type="tel" name="phone" class="form-control" required>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label small fw-bold">Message</label>
                                <textarea name="message" class="form-control" rows="5"></textarea>
                            </div>

                            <!-- Hidden Subject Field -->
                            <input type="hidden" name="_subject" value="New Appointment Request - Sakthi Dental Clinic">

                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary w-100 py-3">
                                    Send Message
                                </button>
                            </div>

                        </div>
                    </form>
                </div>
            </div>

            <!-- Contact Info -->
            <div class="col-lg-5">
                <h3 class="fw-bold mb-4">Reach Us</h3>
                <p><i class="fas fa-map-marker-alt me-2"></i>B2/8, SBM Layout, Anthivadi, Hosur, Tamil Nadu 635109</p>
                <p><i class="fas fa-envelope me-2"></i>info@sakthidentalclinic.in</p>
                <p><i class="fas fa-phone me-2"></i>+91 9862890897</p>
                <p><i class="fas fa-phone me-2"></i>+91 9363298118</p>
            </div>

        </div>
    </div>
</section>

<!-- Footer -->
<footer class="text-center py-4 bg-dark text-light">
    <div class="container">
        <p class="mb-0">&copy; 2026 Sakthi Dental Clinic. All Rights Reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
